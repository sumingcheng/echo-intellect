services:
  mongodb:
    image: mongo:5.0.18
    container_name: mongodb
    restart: always
    ports:
      - 27017:27017
    networks:
      - rag-network
    environment:
      - MONGO_INITDB_ROOT_USERNAME=raguser
      - MONGO_INITDB_ROOT_PASSWORD=ragpassword
    volumes:
      - ./mongo/data:/data/db
    command: mongod --auth

  qdrant:
    container_name: qdrant
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
      - '6334:6334'
    networks:
      - rag-network
    volumes:
      - ./qdrant/storage:/qdrant/storage
    restart: unless-stopped

  redis:
    container_name: redis
    image: redis:7.2
    ports:
      - '6379:6379'
    networks:
      - rag-network
    volumes:
      - ./redis/data:/data
    command: >
      redis-server 
      --appendonly yes 
      --requirepass rag123456
      --maxmemory 2gb 
      --maxmemory-policy allkeys-lfu
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'rag123456', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  rag-network:
    name: rag-network
